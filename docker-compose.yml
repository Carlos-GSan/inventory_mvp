version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: disitech_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-disitech_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Django
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disitech_web
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py ensure_superuser &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --worker-tmp-dir /dev/shm
      "
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - USE_POSTGRES=True
      - POSTGRES_DB=${POSTGRES_DB:-disitech_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin123}
      - USE_BUNNY_STORAGE=${USE_BUNNY_STORAGE:-False}
      - BUNNY_USERNAME=${BUNNY_USERNAME:-}
      - BUNNY_PASSWORD=${BUNNY_PASSWORD:-}
      - BUNNY_TOKEN_KEY=${BUNNY_TOKEN_KEY:-}
      - BUNNY_TOKEN_EXPIRATION=${BUNNY_TOKEN_EXPIRATION:-604800}
      - BUNNY_REGION=${BUNNY_REGION:-la}
      - MEDIA_URL=${MEDIA_URL:-https://disitech.b-cdn.net/}
      - SITE_URL=${SITE_URL:-http://localhost:8000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-False}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-no-reply@example.com}
      - SUPPORT_INBOX=${SUPPORT_INBOX:-soporte@example.com}
    volumes:
      - .:/app
      - /app/.venv
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
