{% extends 'base.html' %}

{% block title %}{{ title }} - DisiTech{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-sm-6">
            <h1 class="m-0">{{ title }}</h1>
        </div>
        <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Inicio</a></li>
                <li class="breadcrumb-item"><a href="{% url 'category_list' %}">Categorías</a></li>
                <li class="breadcrumb-item active">{{ title }}</li>
            </ol>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="bi bi-tag"></i> Datos de la Categoría
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post" id="category-form">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="name" class="form-label">
                                <i class="bi bi-tag-fill"></i> Nombre <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="name" name="name" class="form-control"
                                   value="{{ form.name.value|default:'' }}"
                                   placeholder="Ej: Herramientas" required>
                            <small class="text-muted">Los nombres se normalizan para evitar duplicados</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Guardar Categoría
                            </button>
                            <a href="{% url 'category_list' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
